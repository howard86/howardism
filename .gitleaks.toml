# gitleaks configuration.
#
# Extends the bundled default ruleset (every default rule still applies) and
# adds a single narrow allowlist: public Anthropic/Claude model identifiers
# such as `claude-opus-4-7`, `claude-sonnet-4-6`, `claude-haiku-4-5`. These are
# product names that appear throughout the blog's generated article content and
# trip the `generic-api-key` heuristic when they sit next to words like "API"
# or "model ID". They are public and are not secrets.

[extend]
useDefault = true

[[allowlists]]
description = "Public Anthropic/Claude model identifiers are not secrets"
regexes = [
  '''claude-(?:opus|sonnet|haiku|instant|[0-9])[0-9a-z.\-]*''',
]

# `search-index.json` is a generated artifact: plain-text bodies of the public
# articles, derived 1:1 from the committed MDX (which is itself scanned). It is
# prose, not code, so it has no business holding a credential — yet long article
# text predictably trips the `generic-api-key` entropy heuristic (e.g. a sentence
# like "API model ID: <name>"). Scanning the derived copy adds no security signal,
# only false positives that recur on every re-import. Skip the file by path.
[[allowlists]]
description = "Generated search index is derived public article prose, not secrets"
paths = [
  '''apps/blog/src/data/search-index\.json''',
]
